version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: agent_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: agent_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: agent_redis
    restart: always
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  agent:
    build: .
    container_name: agent_service
    restart: always
    ports:
      - "8000:8000"
    environment:

      # DeepSeek API
      DEEPSEEK_API_KEY: your_deepseek_api_key

      # MySQL
      MYSQL_URL: mysql+aiomysql://root:123456@mysql:3306/agent_db

      # Redis
      REDIS_URL: redis://:redis123@redis:6379/0

    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data: